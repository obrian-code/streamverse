user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$upstream_response_time $request_time';
    access_log /var/log/nginx/access.log main buffer=16k;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=media_limit:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Cache zones for HLS segments
    proxy_cache_path /tmp/hls_cache levels=1:2 keys_zone=hls_cache:50m max_size=5g inactive=24h use_temp_path=off;
    proxy_cache_path /tmp/dash_cache levels=1:2 keys_zone=dash_cache:50m max_size=5g inactive=24h use_temp_path=off;

    # SSL session cache
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.apple.mpegurl
        application/x-mpegurl
        video/mp2t
        image/svg+xml
        image/x-icon
        image/webp
        font/ttf
        font/otf;

    # Upstreams
    upstream backend {
        least_conn;
        server backend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        least_conn;
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ffmpeg_media {
        server ffmpeg:8080 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name streamverse.com www.streamverse.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name streamverse.com www.streamverse.com;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_dhparam /etc/nginx/certs/dhparam.pem;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), fullscreen=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self'; connect-src 'self' wss:; frame-src 'none'; object-src 'none'" always;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_intercept_errors on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # API backend
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://backend;
            proxy_set_header X-Request-ID $request_id;

            add_header X-Request-ID $request_id;
            add_header X-Upstream $upstream_addr;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        # Auth endpoints (stricter rate limit)
        location ~ ^/api/(auth|users)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://backend;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # Media streaming with HLS/DASH caching
        location /media/ {
            limit_req zone=media_limit burst=100 nodelay;

            # HLS segment caching
            location ~* \.m3u8$ {
                proxy_pass http://ffmpeg_media;
                proxy_cache hls_cache;
                proxy_cache_valid 200 30s;
                proxy_cache_key $uri;
                add_header X-Cache-Status $upstream_cache_status;
                expires 30s;
            }

            # TS segment caching
            location ~* \.ts$ {
                proxy_pass http://ffmpeg_media;
                proxy_cache hls_cache;
                proxy_cache_valid 200 24h;
                proxy_cache_key $uri;
                add_header X-Cache-Status $upstream_cache_status;
                expires 24h;
            }

            # DASH manifest caching
            location ~* \.mpd$ {
                proxy_pass http://ffmpeg_media;
                proxy_cache dash_cache;
                proxy_cache_valid 200 30s;
                proxy_cache_key $uri;
                add_header X-Cache-Status $upstream_cache_status;
                expires 30s;
            }

            # DASH segment caching
            location ~* \.m4s$ {
                proxy_pass http://ffmpeg_media;
                proxy_cache dash_cache;
                proxy_cache_valid 200 24h;
                proxy_cache_key $uri;
                add_header X-Cache-Status $upstream_cache_status;
                expires 24h;
            }

            # Default media fallback
            try_files $uri @media_fallback;
        }

        location @media_fallback {
            proxy_pass http://ffmpeg_media;
            proxy_cache hls_cache;
            proxy_cache_valid 200 1h;
            expires 1h;
        }

        # WebSocket for real-time features
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # WebSocket rate limiting
            limit_conn conn_limit 5;
        }

        # Uploads (large body)
        location /uploads/ {
            proxy_pass http://backend;
            client_max_body_size 5g;
            client_body_buffer_size 10m;
            proxy_request_buffering on;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Health endpoint (no auth)
        location /health {
            access_log off;
            proxy_pass http://backend;
            proxy_cache_bypass $http_upgrade;
            add_header Content-Type application/json;
        }

        # Frontend static files
        location / {
            proxy_pass http://frontend;
            proxy_set_header Accept-Encoding $http_accept_encoding;
            proxy_buffering on;
            proxy_cache_bypass $http_upgrade;

            # Static asset caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                proxy_pass http://frontend;
            }

            location ~* \.(html|json)$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                proxy_pass http://frontend;
            }
        }

        # Error pages
        error_page 400 401 402 403 404 /error/404.html;
        error_page 500 502 503 504 /error/50x.html;

        location /error/ {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Map for WebSocket connection upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
}
