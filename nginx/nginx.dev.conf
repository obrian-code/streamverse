user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$upstream_response_time $request_time';
    access_log /var/log/nginx/access.log main buffer=16k;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=media_limit:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    proxy_cache_path /tmp/hls_cache levels=1:2 keys_zone=hls_cache:50m max_size=5g inactive=24h use_temp_path=off;
    proxy_cache_path /tmp/dash_cache levels=1:2 keys_zone=dash_cache:50m max_size=5g inactive=24h use_temp_path=off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.apple.mpegurl
        application/x-mpegurl
        video/mp2t
        image/svg+xml
        image/x-icon
        image/webp
        font/ttf
        font/otf;

    upstream backend {
        least_conn;
        server backend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_intercept_errors on;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 10;
            proxy_pass http://backend;
            proxy_set_header X-Request-ID $request_id;
            add_header X-Request-ID $request_id;
        }

        location ~ ^/api/(auth|users)/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn conn_limit 5;
            proxy_pass http://backend;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            limit_conn conn_limit 5;
        }

        location /uploads/ {
            proxy_pass http://backend;
            client_max_body_size 5g;
            client_body_buffer_size 10m;
            proxy_request_buffering on;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /health {
            access_log off;
            proxy_pass http://backend;
            proxy_cache_bypass $http_upgrade;
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Accept-Encoding $http_accept_encoding;
            proxy_buffering on;
            proxy_cache_bypass $http_upgrade;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                proxy_pass http://frontend;
            }

            location ~* \.(html|json)$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                proxy_pass http://frontend;
            }
        }
    }
}
