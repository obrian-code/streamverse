# =============================================================================
# StreamVerse — Continuous Integration Pipeline
# =============================================================================
# Triggers:
#   - push to main
#   - pull request targeting main
#
# Stages:
#   1. Lint (backend + frontend)
#   2. Test (backend + frontend)
#   3. Build (backend + frontend)
#   4. Upload artifacts
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        project: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        shell: bash

      - name: Run linter
        run: npm run lint
        shell: bash

      - name: Check formatting (Prettier)
        run: npx prettier --check "src/**/*.ts" "src/**/*.json" 2>/dev/null || echo "Formatting check skipped"
        shell: bash
        continue-on-error: true

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        project: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: streamverse_test
          POSTGRES_USER: streamverse
          POSTGRES_PASSWORD: streamverse_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        shell: bash

      - name: Run unit tests
        run: npm run test -- --passWithNoTests --coverage
        shell: bash
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: streamverse
          DB_PASSWORD: streamverse_pass
          DB_NAME: streamverse_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/
          retention-days: 7
          overwrite: true

      - name: Run e2e tests (backend only)
        if: matrix.project == 'backend'
        run: npm run test:e2e -- --passWithNoTests
        shell: bash
        continue-on-error: true
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: streamverse
          DB_PASSWORD: streamverse_pass
          DB_NAME: streamverse_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]

    strategy:
      matrix:
        project: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        shell: bash

      - name: Build project
        run: npm run build
        shell: bash
        env:
          NODE_ENV: production
          NODE_OPTIONS: ${{ env.NODE_OPTIONS }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: |
            ${{ matrix.project }}/dist/
            ${{ matrix.project }}/package.json
          retention-days: 3
          overwrite: true

      - name: Check bundle size (frontend only)
        if: matrix.project == 'frontend'
        run: |
          if [ -d "dist" ]; then
            echo "Bundle size:"
            du -sh dist/ | awk '{print "  " $0}'
            find dist/ -name "*.js" -exec du -sh {} \; | sort -rh | head -10
          fi
        shell: bash

  # ── Docker Build (optional, lightweight check) ────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: streamverse-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: streamverse-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, docker]
    if: always()

    steps:
      - name: Check status
        run: |
          echo "# StreamVerse CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (backend) | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (frontend) | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test (backend) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test (frontend) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (backend) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (frontend) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build Check | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
        shell: bash
